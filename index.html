<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Match Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #2a3441;
    --green: #39d353;
    --green-dim: #1a6b2a;
    --green-glow: rgba(57,211,83,0.15);
    --yellow: #f0c040;
    --red: #f85149;
    --blue: #58a6ff;
    --text: #e6edf3;
    --muted: #7d8590;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grass texture background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(
        90deg,
        rgba(57,211,83,0.02) 0px,
        rgba(57,211,83,0.02) 1px,
        transparent 1px,
        transparent 60px
      ),
      repeating-linear-gradient(
        0deg,
        rgba(57,211,83,0.02) 0px,
        rgba(57,211,83,0.02) 1px,
        transparent 1px,
        transparent 60px
      );
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* HEADER */
  header {
    padding: 32px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 48px; height: 48px;
    background: var(--green);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    box-shadow: 0 0 20px var(--green-glow);
  }
  .logo h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }
  .logo span { color: var(--green); }
  .header-stats { display: flex; gap: 24px; }
  .hstat {
    text-align: center;
  }
  .hstat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--green);
    line-height: 1;
  }
  .hstat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* NAV TABS */
  .nav-tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
    width: fit-content;
  }
  .tab-btn {
    background: none; border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 500;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn.active {
    background: var(--green);
    color: #000;
    font-weight: 600;
  }
  .tab-btn:hover:not(.active) { color: var(--text); background: var(--surface2); }

  /* SECTION VISIBILITY */
  .section { display: none; }
  .section.active { display: block; }

  /* FORM */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    max-width: 700px;
  }
  .form-card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 1px;
    margin-bottom: 24px;
    color: var(--green);
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 10px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px var(--green-glow);
  }
  select option { background: var(--surface2); }
  .score-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; }
  .score-sep { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--muted); text-align: center; }
  .team-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn-submit {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 600;
    padding: 12px 28px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    box-shadow: 0 0 15px rgba(57,211,83,0.3);
  }
  .btn-submit:hover { background: #2bb845; box-shadow: 0 0 25px rgba(57,211,83,0.5); transform: translateY(-1px); }

  /* RESULT BADGE */
  .result-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .result-V { background: rgba(57,211,83,0.15); color: var(--green); border: 1px solid var(--green-dim); }
  .result-N { background: rgba(240,192,64,0.1); color: var(--yellow); border: 1px solid rgba(240,192,64,0.3); }
  .result-D { background: rgba(248,81,73,0.1); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }

  /* TABLE */
  .table-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
  }
  .table-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: 1px; color: var(--text);
  }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-select {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-size: 0.85rem; padding: 6px 12px; cursor: pointer;
  }
  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th {
    padding: 12px 16px;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 600;
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--text); }
  td {
    padding: 12px 16px;
    font-size: 0.9rem;
    border-top: 1px solid var(--border);
  }
  tr:hover td { background: rgba(57,211,83,0.04); }
  .score-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .champ-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
  }
  .btn-delete {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 1rem; transition: color 0.2s;
    padding: 2px 4px;
  }
  .btn-delete:hover { color: var(--red); }
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .big { font-size: 3rem; margin-bottom: 8px; }
  .empty-state p { font-size: 0.9rem; }

  /* STATS GRID */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent, var(--green));
  }
  .stat-card .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    line-height: 1;
    color: var(--accent, var(--green));
    margin-bottom: 4px;
  }
  .stat-card .stat-label {
    font-size: 0.75rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.8px;
  }

  /* CHARTS */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .chart-card h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .chart-card canvas { max-height: 240px; }
  .chart-full { grid-column: 1 / -1; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--green); color: #000;
    font-weight: 600; font-size: 0.9rem;
    padding: 12px 20px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(57,211,83,0.4);
    z-index: 999;
    animation: slideIn 0.3s ease;
    pointer-events: none;
  }
  .toast.hide { animation: slideOut 0.3s ease forwards; }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slideOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(20px); opacity: 0; } }

  /* Responsive */
  @media (max-width: 700px) {
    .form-grid { grid-template-columns: 1fr; }
    .charts-grid { grid-template-columns: 1fr; }
    .chart-full { grid-column: 1; }
    .header-stats { display: none; }
    .hstat-val { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">⚽</div>
        <h1>Match<span>Tracker</span></h1>
      </div>
      <div class="header-stats">
        <div class="hstat"><div class="hstat-val" id="hs-total">0</div><div class="hstat-label">Matchs</div></div>
        <div class="hstat"><div class="hstat-val" id="hs-buts">0</div><div class="hstat-label">Buts vus</div></div>
        <div class="hstat"><div class="hstat-val" id="hs-champs">0</div><div class="hstat-label">Championnats</div></div>
      </div>
    </div>
  </header>

  <nav class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('ajouter')">➕ Ajouter</button>
    <button class="tab-btn" onclick="showTab('tableau')">📋 Tableau</button>
    <button class="tab-btn" onclick="showTab('stats')">📊 Stats & Graphiques</button>
  </nav>

  <!-- AJOUTER UN MATCH -->
  <div class="section active" id="tab-ajouter">
    <div class="form-card">
      <h2>Nouveau Match</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Date du match</label>
          <input type="date" id="f-date">
        </div>
        <div class="form-group">
          <label>Championnat / Compétition</label>
          <input type="text" id="f-champ" placeholder="Ligue 1, Champions League…" list="champ-suggestions">
          <datalist id="champ-suggestions">
            <option value="Ligue 1">
            <option value="Premier League">
            <option value="Liga">
            <option value="Bundesliga">
            <option value="Serie A">
            <option value="Ligue des Champions">
            <option value="Europa League">
            <option value="Coupe de France">
            <option value="Coupe du Monde">
            <option value="Championship">
            <option value="Ligue 2"> 
            <option value="Liga Portugal">
            <option value="Conference League"> 
          </datalist>
        </div>
        <div class="form-group">
          <label>Équipe domicile</label>
          <input type="text" id="f-dom" placeholder="PSG, Man City…">
        </div>
        <div class="form-group">
          <label>Équipe extérieur</label>
          <input type="text" id="f-ext" placeholder="Real Madrid, Arsenal…">
        </div>
        <div class="form-group full">
          <label>Score</label>
          <div class="score-row">
            <input type="number" id="f-score-dom" min="0" max="30" placeholder="0" style="text-align:center; font-size:1.3rem; font-weight:700;">
            <div class="score-sep">—</div>
            <input type="number" id="f-score-ext" min="0" max="30" placeholder="0" style="text-align:center; font-size:1.3rem; font-weight:700;">
          </div>
        </div>
        <div class="form-group">
          <label>Journée / Tour</label>
          <input type="text" id="f-journee" placeholder="J12, Demi-finale…">
        </div>
        <div class="form-group">
          <label>Lieu de visionnage</label>
          <select id="f-lieu">
            <option value="TV">📺 TV</option>
            <option value="Stade">🏟️ Stade</option>
            <option value="Streaming">💻 Streaming</option>
            <option value="Bar">🍺 Bar</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Commentaire</label>
          <textarea id="f-comment" rows="2" placeholder="Résumé, anecdote, but de folie…" style="resize:vertical;"></textarea>
        </div>
      </div>
      <button class="btn-submit" onclick="addMatch()">⚽ Enregistrer le match</button>
    </div>
  </div>

  <!-- TABLEAU -->
  <div class="section" id="tab-tableau">
    <div class="table-header">
      <h2>Tous les matchs</h2>
      <div class="filters">
        <select class="filter-select" id="filter-champ" onchange="renderTable()">
          <option value="">Tous les championnats</option>
        </select>
        <select class="filter-select" id="filter-lieu" onchange="renderTable()">
          <option value="">Tous lieux</option>
          <option value="TV">TV</option>
          <option value="Stade">Stade</option>
          <option value="Streaming">Streaming</option>
          <option value="Bar">Bar</option>
        </select>
      </div>
    </div>
    <div class="table-wrap">
      <table id="match-table">
        <thead>
          <tr>
            <th onclick="sortBy('date')">Date ⇅</th>
            <th onclick="sortBy('champ')">Championnat ⇅</th>
            <th>Match</th>
            <th>Score</th>
            <th>Lieu</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- STATS -->
  <div class="section" id="tab-stats">
    <div class="stats-grid" id="stats-cards"></div>
    <div class="charts-grid">
      <div class="chart-card chart-full">
        <h3>Matchs par mois et par championnat</h3>
        <canvas id="chart-mois-champ" style="max-height:320px;"></canvas>
      </div>
      <div class="chart-card">
        <h3>Matchs par championnat</h3>
        <canvas id="chart-champs"></canvas>
      </div>
      <div class="chart-card chart-full">
        <h3>Buts par match (évolution)</h3>
        <canvas id="chart-buts"></canvas>
      </div>
      <div class="chart-card">
        <h3>Lieu de visionnage</h3>
        <canvas id="chart-lieu"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
let matches = JSON.parse(localStorage.getItem('ft_matches') || '[]');
let sortCol = 'date', sortDir = -1;
let charts = {};

function save() { localStorage.setItem('ft_matches', JSON.stringify(matches)); }

// ─── ADD MATCH ────────────────────────────────────────────────────────────────
function addMatch() {
  const date = document.getElementById('f-date').value;
  const champ = document.getElementById('f-champ').value.trim();
  const dom = document.getElementById('f-dom').value.trim();
  const ext = document.getElementById('f-ext').value.trim();
  const sd = document.getElementById('f-score-dom').value;
  const se = document.getElementById('f-score-ext').value;

  if (!date || !champ || !dom || !ext || sd === '' || se === '') {
    showToast('⚠️ Remplis les champs obligatoires !', '#f0c040');
    return;
  }

  const m = {
    id: Date.now(),
    date,
    champ,
    equipe_dom: dom,
    equipe_ext: ext,
    score_dom: parseInt(sd),
    score_ext: parseInt(se),
    journee: document.getElementById('f-journee').value.trim(),
    lieu: document.getElementById('f-lieu').value,
    comment: document.getElementById('f-comment').value.trim()
  };

  matches.push(m);
  save();
  showToast('✅ Match enregistré !');
  resetForm();
  updateHeaderStats();
}

function resetForm() {
  ['f-date','f-champ','f-dom','f-ext','f-score-dom','f-score-ext','f-journee','f-comment'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-date').valueAsDate = new Date();
}

function deleteMatch(id) {
  matches = matches.filter(m => m.id !== id);
  save();
  renderTable();
  renderStats();
  updateHeaderStats();
  showToast('🗑️ Match supprimé', '#f85149');
}

// ─── TABLE ─────────────────────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  const fc = document.getElementById('filter-champ').value;
  const fl = document.getElementById('filter-lieu').value;

  let data = [...matches].filter(m => {
    if (fc && m.champ !== fc) return false;
    if (fl && m.lieu !== fl) return false;
    return true;
  });

  data.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va < vb) return -sortDir;
    if (va > vb) return sortDir;
    return 0;
  });

  if (data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="big">📋</div><p>Aucun match trouvé</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(m => {
    const lieuIcon = {TV:'📺', Stade:'🏟️', Streaming:'💻', Bar:'🍺'}[m.lieu] || '';
    const dateStr = new Date(m.date).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', year:'2-digit'});
    return `<tr title="${m.comment || ''}">
      <td style="color:var(--muted);font-size:0.85rem;font-family:'JetBrains Mono',monospace">${dateStr}</td>
      <td><span class="champ-badge">${m.champ}</span></td>
      <td><strong>${m.equipe_dom}</strong> <span style="color:var(--muted)">vs</span> <strong>${m.equipe_ext}</strong></td>
      <td><span class="score-display">${m.score_dom} – ${m.score_ext}</span></td>
      <td style="font-size:0.85rem">${lieuIcon} ${m.lieu}</td>
      <td><button class="btn-delete" onclick="deleteMatch(${m.id})" title="Supprimer">✕</button></td>
    </tr>`;
  }).join('');

  // Update filter options
  const champs = [...new Set(matches.map(m => m.champ))].sort();
  const fc_el = document.getElementById('filter-champ');
  const cur = fc_el.value;
  fc_el.innerHTML = '<option value="">Tous les championnats</option>' + champs.map(c => `<option value="${c}" ${c===cur?'selected':''}>${c}</option>`).join('');
}

// ─── STATS & CHARTS ──────────────────────────────────────────────────────────
function renderStats() {
  if (!matches.length) {
    document.getElementById('stats-cards').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="big">📊</div><p>Ajoute des matchs pour voir tes stats !</p></div>`;
    return;
  }

  const total = matches.length;
  const totalButs = matches.reduce((s, m) => s + m.score_dom + m.score_ext, 0);
  const avgButs = (totalButs / total).toFixed(1);
  const champs = new Set(matches.map(m => m.champ)).size;
  const stade = matches.filter(m => m.lieu === 'Stade').length;
  const maxButs = Math.max(...matches.map(m => m.score_dom + m.score_ext));

  const cards = [
    { val: total, label: 'Matchs vus', accent: 'var(--green)' },
    { val: totalButs, label: 'Buts vus', accent: 'var(--yellow)' },
    { val: avgButs, label: 'Buts/match', accent: 'var(--blue)' },
    { val: champs, label: 'Championnats', accent: 'var(--blue)' },
    { val: stade, label: 'Au stade', accent: '#e879f9' },
    { val: maxButs, label: 'Record de buts', accent: 'var(--red)' },
  ];

  document.getElementById('stats-cards').innerHTML = cards.map(c => `
    <div class="stat-card" style="--accent:${c.accent}">
      <div class="stat-val">${c.val}</div>
      <div class="stat-label">${c.label}</div>
    </div>`).join('');

  buildCharts();
}

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

// Palette de couleurs pour les championnats
const PALETTE = [
  'rgba(57,211,83,0.75)', 'rgba(88,166,255,0.75)', 'rgba(240,192,64,0.75)',
  'rgba(232,121,249,0.75)', 'rgba(248,81,73,0.75)', 'rgba(255,165,0,0.75)',
  'rgba(0,206,209,0.75)', 'rgba(255,105,180,0.75)', 'rgba(124,252,0,0.75)'
];

const MOIS_LABELS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

function buildCharts() {
  // 1. Matchs par mois et par championnat (barres groupées)
  destroyChart('mois-champ');
  const allChamps = [...new Set(matches.map(m => m.champ))].sort();
  // data[champ][moisIndex] = count
  const dataByChamp = {};
  allChamps.forEach(c => { dataByChamp[c] = Array(12).fill(0); });
  matches.forEach(m => {
    const mois = new Date(m.date).getMonth();
    dataByChamp[m.champ][mois]++;
  });
  // Garder uniquement les mois qui ont au moins 1 match
  const moisActifs = MOIS_LABELS.map((_, i) => i).filter(i => matches.some(m => new Date(m.date).getMonth() === i));
  charts['mois-champ'] = new Chart(document.getElementById('chart-mois-champ'), {
    type: 'bar',
    data: {
      labels: moisActifs.map(i => MOIS_LABELS[i]),
      datasets: allChamps.map((champ, idx) => ({
        label: champ,
        data: moisActifs.map(i => dataByChamp[champ][i]),
        backgroundColor: PALETTE[idx % PALETTE.length],
        borderRadius: 5,
        borderSkipped: false,
      }))
    },
    options: {
      plugins: {
        legend: { labels: { color: '#7d8590', padding: 16, font: { size: 12 } } }
      },
      scales: {
        x: { ticks: { color: '#7d8590' }, grid: { color: '#2a3441' }, stacked: false },
        y: { ticks: { color: '#7d8590', stepSize: 1 }, grid: { color: '#2a3441' }, stacked: false }
      }
    }
  });

  // 2. Matchs par championnat (bar)
  destroyChart('champs');
  const champCounts = {};
  matches.forEach(m => { champCounts[m.champ] = (champCounts[m.champ] || 0) + 1; });
  const champEntries = Object.entries(champCounts).sort((a,b)=>b[1]-a[1]);
  charts['champs'] = new Chart(document.getElementById('chart-champs'), {
    type: 'bar',
    data: {
      labels: champEntries.map(e => e[0]),
      datasets: [{
        label: 'Matchs',
        data: champEntries.map(e => e[1]),
        backgroundColor: champEntries.map((_, i) => PALETTE[i % PALETTE.length]),
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#7d8590' }, grid: { color: '#2a3441' } },
        y: { ticks: { color: '#7d8590', stepSize: 1 }, grid: { color: '#2a3441' } }
      }
    }
  });

  // 3. Buts par match (line)
  destroyChart('buts');
  const sorted = [...matches].sort((a,b) => a.date.localeCompare(b.date));
  charts['buts'] = new Chart(document.getElementById('chart-buts'), {
    type: 'line',
    data: {
      labels: sorted.map(m => {
        const d = new Date(m.date);
        return `${d.getDate()}/${d.getMonth()+1} ${m.equipe_dom} vs ${m.equipe_ext}`;
      }),
      datasets: [{
        label: 'Buts totaux',
        data: sorted.map(m => m.score_dom + m.score_ext),
        borderColor: '#39d353',
        backgroundColor: 'rgba(57,211,83,0.1)',
        tension: 0.4, fill: true,
        pointBackgroundColor: '#39d353',
        pointRadius: 4
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#7d8590', maxRotation: 45 }, grid: { display: false } },
        y: { ticks: { color: '#7d8590', stepSize: 1 }, grid: { color: '#2a3441' } }
      }
    }
  });

  // 4. Lieu de visionnage (polar area)
  destroyChart('lieu');
  const lieuCount = {};
  matches.forEach(m => { lieuCount[m.lieu] = (lieuCount[m.lieu]||0)+1; });
  charts['lieu'] = new Chart(document.getElementById('chart-lieu'), {
    type: 'polarArea',
    data: {
      labels: Object.keys(lieuCount),
      datasets: [{
        data: Object.values(lieuCount),
        backgroundColor: ['rgba(88,166,255,0.7)','rgba(57,211,83,0.7)','rgba(232,121,249,0.7)','rgba(240,192,64,0.7)'],
        borderWidth: 0
      }]
    },
    options: {
      plugins: { legend: { labels: { color: '#7d8590' } } },
      scales: { r: { ticks: { color: '#7d8590', backdropColor: 'transparent' }, grid: { color: '#2a3441' } } }
    }
  });
}

// ─── TABS ─────────────────────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'tableau') renderTable();
  if (tab === 'stats') renderStats();
}

function updateHeaderStats() {
  document.getElementById('hs-total').textContent = matches.length;
  document.getElementById('hs-buts').textContent = matches.reduce((s,m)=>s+m.score_dom+m.score_ext,0);
  document.getElementById('hs-champs').textContent = new Set(matches.map(m=>m.champ)).size;
}

// ─── TOAST ────────────────────────────────────────────────────────────────
function showToast(msg, bg = '#39d353') {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  t.style.background = bg;
  if (bg !== '#39d353') t.style.color = '#fff';
  document.body.appendChild(t);
  setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 300); }, 2200);
}

// ─── INIT ─────────────────────────────────────────────────────────────────
Chart.defaults.color = '#7d8590';
Chart.defaults.font.family = 'DM Sans';
document.getElementById('f-date').valueAsDate = new Date();
updateHeaderStats();
</script>
