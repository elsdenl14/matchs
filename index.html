<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Match Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0d1117; --surface:#161b22; --surface2:#1c2330; --border:#2a3441;
    --green:#39d353; --green-dim:#1a6b2a; --green-glow:rgba(57,211,83,0.15);
    --yellow:#f0c040; --red:#f85149; --blue:#58a6ff;
    --text:#e6edf3; --muted:#7d8590;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(90deg,rgba(57,211,83,.02) 0px,rgba(57,211,83,.02) 1px,transparent 1px,transparent 60px),repeating-linear-gradient(0deg,rgba(57,211,83,.02) 0px,rgba(57,211,83,.02) 1px,transparent 1px,transparent 60px);pointer-events:none;z-index:0;}
  .container{max-width:1300px;margin:0 auto;padding:0 20px;position:relative;z-index:1;}

  /* ── AUTH ── */
  #auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
  .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 0 60px rgba(57,211,83,.06);}
  .auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
  .auth-logo-icon{width:48px;height:48px;background:var(--green);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 20px var(--green-glow);}
  .auth-logo h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;line-height:1;}
  .auth-logo span{color:var(--green);}
  .auth-tabs{display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px;}
  .auth-tab{flex:1;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;padding:8px;border-radius:7px;cursor:pointer;transition:all .2s;}
  .auth-tab.active{background:var(--green);color:#000;font-weight:600;}
  .auth-form{display:flex;flex-direction:column;gap:14px;}
  .auth-form .fg{display:flex;flex-direction:column;gap:5px;}
  .auth-form label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
  .auth-form input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;padding:10px 14px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;}
  .auth-form input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow);}
  .btn-auth{background:var(--green);color:#000;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;padding:12px;cursor:pointer;transition:all .2s;box-shadow:0 0 15px rgba(57,211,83,.3);margin-top:4px;}
  .btn-auth:hover{background:#2bb845;transform:translateY(-1px);}
  .btn-auth:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .auth-sep{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.8rem;margin:2px 0;}
  .auth-sep::before,.auth-sep::after{content:'';flex:1;height:1px;background:var(--border);}
  .btn-google{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;padding:11px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;}
  .btn-google:hover{border-color:var(--green);background:rgba(57,211,83,.05);}
  .btn-google svg{width:18px;height:18px;flex-shrink:0;}
  .auth-err{font-size:.82rem;text-align:center;min-height:18px;color:var(--red);}
  .auth-ok{font-size:.82rem;text-align:center;min-height:18px;color:var(--green);}

  /* ── APP ── */
  #app-screen{display:none;}
  header{padding:28px 0 18px;border-bottom:1px solid var(--border);margin-bottom:28px;}
  .header-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-icon{width:44px;height:44px;background:var(--green);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px var(--green-glow);}
  .logo h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;line-height:1;}
  .logo span{color:var(--green);}
  .header-right{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  .header-stats{display:flex;gap:20px;}
  .hstat{text-align:center;}
  .hstat-val{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--green);line-height:1;}
  .hstat-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .user-info{display:flex;align-items:center;gap:8px;}
  .user-email{font-size:.8rem;color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .btn-logout{background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.8rem;padding:5px 12px;cursor:pointer;transition:all .2s;}
  .btn-logout:hover{border-color:var(--red);color:var(--red);}

  /* NAV */
  .nav-tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:28px;width:fit-content;}
  .tab-btn{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;padding:8px 20px;border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .tab-btn.active{background:var(--green);color:#000;font-weight:600;}
  .tab-btn:hover:not(.active){color:var(--text);background:var(--surface2);}
  .section{display:none;} .section.active{display:block;}

  /* FORM */
  .form-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:700px;}
  .form-card h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1px;margin-bottom:24px;color:var(--green);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  .form-group.full{grid-column:1/-1;}
  label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:500;}
  input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;padding:10px 14px;transition:border-color .2s,box-shadow .2s;outline:none;width:100%;}
  input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow);}
  select option{background:var(--surface2);}
  .score-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;}
  .score-sep{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--muted);text-align:center;}
  .btn-submit{background:var(--green);color:#000;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;padding:12px 28px;cursor:pointer;margin-top:8px;transition:all .2s;box-shadow:0 0 15px rgba(57,211,83,.3);}
  .btn-submit:hover:not(:disabled){background:#2bb845;box-shadow:0 0 25px rgba(57,211,83,.5);transform:translateY(-1px);}
  .btn-submit:disabled{opacity:.5;cursor:not-allowed;}

  /* TABLE */
  .table-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px;}
  .table-header h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1px;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;}
  .filter-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:.85rem;padding:6px 12px;cursor:pointer;}
  .table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
  table{width:100%;border-collapse:collapse;}
  thead{background:var(--surface2);}
  th{padding:12px 16px;font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;}
  th:hover{color:var(--text);}
  td{padding:12px 16px;font-size:.9rem;border-top:1px solid var(--border);}
  tr:hover td{background:rgba(57,211,83,.04);}
  .score-display{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:600;}
  .champ-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--muted);white-space:nowrap;}
  .btn-delete{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;transition:color .2s;padding:2px 4px;}
  .btn-delete:hover{color:var(--red);}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-state .big{font-size:3rem;margin-bottom:8px;}
  .empty-state p{font-size:.9rem;}

  /* STATS */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:28px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--green));}
  .stat-card .stat-val{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;line-height:1;color:var(--accent,var(--green));margin-bottom:4px;}
  .stat-card .stat-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
  .chart-card h3{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;color:var(--muted);margin-bottom:16px;text-transform:uppercase;}
  .chart-card canvas{max-height:240px;}
  .chart-full{grid-column:1/-1;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#000;font-weight:600;font-size:.9rem;padding:12px 20px;border-radius:10px;box-shadow:0 0 20px rgba(57,211,83,.4);z-index:999;animation:slideIn .3s ease;pointer-events:none;}
  .toast.hide{animation:slideOut .3s ease forwards;}
  @keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes slideOut{from{transform:translateY(0);opacity:1}to{transform:translateY(20px);opacity:0}}

  @media(max-width:700px){
    .form-grid{grid-template-columns:1fr;}
    .charts-grid{grid-template-columns:1fr;}
    .chart-full{grid-column:1;}
    .header-stats{display:none;}
    .user-email{display:none;}
  }
</style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚽</div>
      <h1>Match<span>Tracker</span></h1>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login-btn" onclick="switchAuthTab('login')">Connexion</button>
      <button class="auth-tab" id="tab-signup-btn" onclick="switchAuthTab('signup')">Inscription</button>
    </div>

    <!-- Connexion -->
    <div id="auth-form-login" class="auth-form">
      <div class="fg"><label>Email</label><input type="email" id="login-email" placeholder="toi@email.com" autocomplete="email"></div>
      <div class="fg"><label>Mot de passe</label><input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')loginEmail()"></div>
      <p class="auth-err" id="login-err"></p>
      <button class="btn-auth" id="btn-login" onclick="loginEmail()">Se connecter</button>
      <div class="auth-sep">ou</div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuer avec Google
      </button>
    </div>

    <!-- Inscription -->
    <div id="auth-form-signup" class="auth-form" style="display:none">
      <div class="fg"><label>Email</label><input type="email" id="signup-email" placeholder="toi@email.com" autocomplete="email"></div>
      <div class="fg"><label>Mot de passe (min. 6 caractères)</label><input type="password" id="signup-pwd" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter')signupEmail()"></div>
      <p class="auth-err" id="signup-err"></p>
      <p class="auth-ok" id="signup-ok"></p>
      <button class="btn-auth" id="btn-signup" onclick="signupEmail()">Créer mon compte</button>
      <div class="auth-sep">ou</div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuer avec Google
      </button>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app-screen">
<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">⚽</div>
        <h1>Match<span>Tracker</span></h1>
      </div>
      <div class="header-right">
        <div class="header-stats">
          <div class="hstat"><div class="hstat-val" id="hs-total">0</div><div class="hstat-label">Matchs</div></div>
          <div class="hstat"><div class="hstat-val" id="hs-buts">0</div><div class="hstat-label">Buts vus</div></div>
          <div class="hstat"><div class="hstat-val" id="hs-champs">0</div><div class="hstat-label">Championnats</div></div>
        </div>
        <div class="user-info">
          <span class="user-email" id="user-email-display"></span>
          <button class="btn-logout" onclick="logout()">Déconnexion</button>
        </div>
      </div>
    </div>
  </header>

  <nav class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('ajouter',event)">➕ Ajouter</button>
    <button class="tab-btn" onclick="showTab('tableau',event)">📋 Tableau</button>
    <button class="tab-btn" onclick="showTab('stats',event)">📊 Stats &amp; Graphiques</button>
  </nav>

  <!-- AJOUTER -->
  <div class="section active" id="tab-ajouter">
    <div class="form-card">
      <h2>Nouveau Match</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Date du match</label>
          <input type="date" id="f-date">
        </div>
        <div class="form-group">
          <label>Championnat / Compétition</label>
          <input type="text" id="f-champ" placeholder="Ligue 1, Champions League…" list="champ-list">
          <datalist id="champ-list">
            <option value="Ligue 1"><option value="Premier League"><option value="Liga">
            <option value="Bundesliga"><option value="Serie A"><option value="Ligue des Champions">
            <option value="Europa League"><option value="Coupe de France"><option value="Coupe du Monde">
            <option value="Conference League"><option value="Ligue 2"><option value="Championship"><option value="MLS">
          </datalist>
        </div>
        <div class="form-group">
          <label>Équipe domicile</label>
          <input type="text" id="f-dom" placeholder="PSG, Man City…">
        </div>
        <div class="form-group">
          <label>Équipe extérieur</label>
          <input type="text" id="f-ext" placeholder="Real Madrid, Arsenal…">
        </div>
        <div class="form-group full">
          <label>Score</label>
          <div class="score-row">
            <input type="number" id="f-score-dom" min="0" max="30" placeholder="0" style="text-align:center;font-size:1.3rem;font-weight:700;">
            <div class="score-sep">—</div>
            <input type="number" id="f-score-ext" min="0" max="30" placeholder="0" style="text-align:center;font-size:1.3rem;font-weight:700;">
          </div>
        </div>
        <div class="form-group">
          <label>Journée / Tour</label>
          <input type="text" id="f-journee" placeholder="J12, Demi-finale…">
        </div>
        <div class="form-group">
          <label>Lieu de visionnage</label>
          <select id="f-lieu">
            <option value="TV">📺 TV</option>
            <option value="Stade">🏟️ Stade</option>
            <option value="Streaming">💻 Streaming</option>
            <option value="Bar">🍺 Bar</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Commentaire</label>
          <textarea id="f-comment" rows="2" placeholder="Résumé, anecdote, but de folie…" style="resize:vertical;"></textarea>
        </div>
      </div>
      <button class="btn-submit" id="btn-add" onclick="addMatch()">⚽ Enregistrer le match</button>
    </div>
  </div>

  <!-- TABLEAU -->
  <div class="section" id="tab-tableau">
    <div class="table-header">
      <h2>Tous les matchs</h2>
      <div class="filters">
        <select class="filter-select" id="filter-champ" onchange="renderTable()"><option value="">Tous les championnats</option></select>
        <select class="filter-select" id="filter-lieu" onchange="renderTable()">
          <option value="">Tous lieux</option>
          <option value="TV">TV</option><option value="Stade">Stade</option>
          <option value="Streaming">Streaming</option><option value="Bar">Bar</option>
        </select>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th onclick="sortBy('date')">Date ⇅</th>
          <th onclick="sortBy('champ')">Championnat ⇅</th>
          <th>Match</th><th>Score</th><th>Lieu</th><th></th>
        </tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- STATS -->
  <div class="section" id="tab-stats">
    <div class="stats-grid" id="stats-cards"></div>
    <div class="charts-grid">
      <div class="chart-card chart-full">
        <h3>Matchs par mois et par championnat</h3>
        <canvas id="chart-mois-champ" style="max-height:320px;"></canvas>
      </div>
      <div class="chart-card">
        <h3>Matchs par championnat</h3>
        <canvas id="chart-champs"></canvas>
      </div>
      <div class="chart-card">
        <h3>Lieu de visionnage</h3>
        <canvas id="chart-lieu"></canvas>
      </div>
      <div class="chart-card chart-full">
        <h3>Buts par match (évolution)</h3>
        <canvas id="chart-buts"></canvas>
      </div>
    </div>
  </div>
</div>
</div>

<script>
// ══ CONFIG ══
const SUPABASE_URL  = 'https://yfarnkceubcfjpixuxyf.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmYXJua2NldWJjZmpwaXh1eHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNjA5NTksImV4cCI6MjA5MzczNjk1OX0.lQ7QHH95esfomAIiTtTXQ8jeMUTzrTvoxKCEwtzbM0k';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ══ STATE ══
let matches = [], currentUser = null, sortCol = 'date', sortDir = -1, charts = {};
const PALETTE = ['rgba(57,211,83,.75)','rgba(88,166,255,.75)','rgba(240,192,64,.75)','rgba(232,121,249,.75)','rgba(248,81,73,.75)','rgba(255,165,0,.75)','rgba(0,206,209,.75)','rgba(255,105,180,.75)','rgba(124,252,0,.75)'];
const MOIS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

// ══ AUTH ══
function switchAuthTab(tab) {
  document.getElementById('tab-login-btn').classList.toggle('active', tab==='login');
  document.getElementById('tab-signup-btn').classList.toggle('active', tab==='signup');
  document.getElementById('auth-form-login').style.display  = tab==='login'  ? 'flex':'none';
  document.getElementById('auth-form-signup').style.display = tab==='signup' ? 'flex':'none';
}

async function loginEmail() {
  const email = document.getElementById('login-email').value.trim();
  const pwd   = document.getElementById('login-pwd').value;
  const btn   = document.getElementById('btn-login');
  document.getElementById('login-err').textContent = '';
  btn.disabled = true; btn.textContent = 'Connexion…';
  const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
  btn.disabled = false; btn.textContent = 'Se connecter';
  if (error) document.getElementById('login-err').textContent = tradErr(error.message);
}

async function signupEmail() {
  const email = document.getElementById('signup-email').value.trim();
  const pwd   = document.getElementById('signup-pwd').value;
  const btn   = document.getElementById('btn-signup');
  document.getElementById('signup-err').textContent = '';
  document.getElementById('signup-ok').textContent  = '';
  btn.disabled = true; btn.textContent = 'Création…';
  const { error } = await sb.auth.signUp({ email, password: pwd });
  btn.disabled = false; btn.textContent = 'Créer mon compte';
  if (error) document.getElementById('signup-err').textContent = tradErr(error.message);
  else       document.getElementById('signup-ok').textContent  = '✅ Vérifie tes emails pour confirmer ton compte !';
}

async function loginGoogle() {
  await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.href } });
}

async function logout() {
  await sb.auth.signOut();
  matches = []; currentUser = null;
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display  = 'none';
}

function tradErr(m) {
  if (m.includes('Invalid login'))      return 'Email ou mot de passe incorrect.';
  if (m.includes('already registered')) return 'Email déjà utilisé. Connecte-toi.';
  if (m.includes('Password should'))    return 'Mot de passe trop court (6 caractères min).';
  return m;
}

// ══ SUPABASE CRUD ══
async function loadMatches() {
  const { data, error } = await sb.from('matches').select('*').order('date', { ascending:false });
  if (error) { showToast('❌ Erreur chargement', '#f85149'); return; }
  matches = data || [];
  updateHeaderStats();
}

async function addMatch() {
  const date  = document.getElementById('f-date').value;
  const champ = document.getElementById('f-champ').value.trim();
  const dom   = document.getElementById('f-dom').value.trim();
  const ext   = document.getElementById('f-ext').value.trim();
  const sd    = document.getElementById('f-score-dom').value;
  const se    = document.getElementById('f-score-ext').value;
  if (!date||!champ||!dom||!ext||sd===''||se==='') { showToast('⚠️ Remplis les champs obligatoires !','#f0c040'); return; }

  const btn = document.getElementById('btn-add');
  btn.disabled = true; btn.textContent = '⏳ Enregistrement…';

  const row = {
    id: Date.now(), user_id: currentUser.id,
    date, champ, equipe_dom:dom, equipe_ext:ext,
    score_dom:parseInt(sd), score_ext:parseInt(se),
    journee: document.getElementById('f-journee').value.trim()||null,
    lieu:    document.getElementById('f-lieu').value,
    comment: document.getElementById('f-comment').value.trim()||null,
  };

  const { error } = await sb.from('matches').insert([row]);
  btn.disabled = false; btn.textContent = '⚽ Enregistrer le match';

  if (error) { showToast('❌ Erreur : '+error.message,'#f85149'); return; }
  matches.unshift(row);
  showToast('✅ Match enregistré !');
  resetForm();
  updateHeaderStats();
}

async function deleteMatch(id) {
  const { error } = await sb.from('matches').delete().eq('id', id);
  if (error) { showToast('❌ Erreur suppression','#f85149'); return; }
  matches = matches.filter(m => m.id !== id);
  renderTable();
  if (document.getElementById('tab-stats').classList.contains('active')) renderStats();
  updateHeaderStats();
  showToast('🗑️ Match supprimé','#f85149');
}

// ══ FORM ══
function resetForm() {
  ['f-champ','f-dom','f-ext','f-score-dom','f-score-ext','f-journee','f-comment'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-date').valueAsDate = new Date();
}

// ══ TABLE ══
function sortBy(col) {
  sortDir = (sortCol===col) ? sortDir*-1 : -1;
  sortCol = col;
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  const fc = document.getElementById('filter-champ').value;
  const fl = document.getElementById('filter-lieu').value;
  let data = matches.filter(m => (!fc||m.champ===fc)&&(!fl||m.lieu===fl));
  data.sort((a,b)=>{ const va=a[sortCol]??'', vb=b[sortCol]??''; return va<vb?-sortDir:va>vb?sortDir:0; });

  if (!data.length) {
    tbody.innerHTML=`<tr><td colspan="6"><div class="empty-state"><div class="big">📋</div><p>Aucun match trouvé</p></div></td></tr>`;
  } else {
    const icons={TV:'📺',Stade:'🏟️',Streaming:'💻',Bar:'🍺'};
    tbody.innerHTML = data.map(m => {
      const d = new Date(m.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'});
      return `<tr title="${m.comment||''}">
        <td style="color:var(--muted);font-size:.85rem;font-family:'JetBrains Mono',monospace">${d}</td>
        <td><span class="champ-badge">${m.champ}</span></td>
        <td><strong>${m.equipe_dom}</strong> <span style="color:var(--muted)">vs</span> <strong>${m.equipe_ext}</strong></td>
        <td><span class="score-display">${m.score_dom} – ${m.score_ext}</span></td>
        <td style="font-size:.85rem">${icons[m.lieu]||''} ${m.lieu}</td>
        <td><button class="btn-delete" onclick="deleteMatch(${m.id})" title="Supprimer">✕</button></td>
      </tr>`;
    }).join('');
  }

  const champs = [...new Set(matches.map(m=>m.champ))].sort();
  const el = document.getElementById('filter-champ'), cur = el.value;
  el.innerHTML = '<option value="">Tous les championnats</option>' + champs.map(c=>`<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');
}

// ══ STATS ══
function renderStats() {
  if (!matches.length) {
    document.getElementById('stats-cards').innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="big">📊</div><p>Ajoute des matchs pour voir tes stats !</p></div>`;
    return;
  }
  const total=matches.length, totalButs=matches.reduce((s,m)=>s+m.score_dom+m.score_ext,0);
  document.getElementById('stats-cards').innerHTML = [
    {val:total,               label:'Matchs vus',    accent:'var(--green)'},
    {val:totalButs,           label:'Buts vus',       accent:'var(--yellow)'},
    {val:(totalButs/total).toFixed(1), label:'Buts/match', accent:'var(--blue)'},
    {val:new Set(matches.map(m=>m.champ)).size, label:'Championnats', accent:'var(--blue)'},
    {val:matches.filter(m=>m.lieu==='Stade').length, label:'Au stade', accent:'#e879f9'},
    {val:Math.max(...matches.map(m=>m.score_dom+m.score_ext)), label:'Record de buts', accent:'var(--red)'},
  ].map(c=>`<div class="stat-card" style="--accent:${c.accent}"><div class="stat-val">${c.val}</div><div class="stat-label">${c.label}</div></div>`).join('');
  buildCharts();
}

function destroyChart(id) { if(charts[id]){charts[id].destroy();delete charts[id];} }

function buildCharts() {
  Chart.defaults.color='#7d8590'; Chart.defaults.font.family='DM Sans';

  // 1. Mois × Championnat
  destroyChart('mois-champ');
  const allChamps=[...new Set(matches.map(m=>m.champ))].sort();
  const byChamp={};
  allChamps.forEach(c=>{byChamp[c]=Array(12).fill(0);});
  matches.forEach(m=>{byChamp[m.champ][new Date(m.date).getMonth()]++;});
  const moisActifs=[...Array(12).keys()].filter(i=>matches.some(m=>new Date(m.date).getMonth()===i));
  charts['mois-champ']=new Chart(document.getElementById('chart-mois-champ'),{
    type:'bar',
    data:{
      labels:moisActifs.map(i=>MOIS[i]),
      datasets:allChamps.map((c,i)=>({label:c,data:moisActifs.map(j=>byChamp[c][j]),backgroundColor:PALETTE[i%PALETTE.length],borderRadius:5,borderSkipped:false}))
    },
    options:{plugins:{legend:{labels:{color:'#7d8590',padding:16}}},scales:{x:{ticks:{color:'#7d8590'},grid:{color:'#2a3441'}},y:{ticks:{color:'#7d8590',stepSize:1},grid:{color:'#2a3441'}}}}
  });

  // 2. Par championnat
  destroyChart('champs');
  const cc={};
  matches.forEach(m=>{cc[m.champ]=(cc[m.champ]||0)+1;});
  const ce=Object.entries(cc).sort((a,b)=>b[1]-a[1]);
  charts['champs']=new Chart(document.getElementById('chart-champs'),{
    type:'bar',
    data:{labels:ce.map(e=>e[0]),datasets:[{label:'Matchs',data:ce.map(e=>e[1]),backgroundColor:ce.map((_,i)=>PALETTE[i%PALETTE.length]),borderRadius:6,borderSkipped:false}]},
    options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#7d8590'},grid:{color:'#2a3441'}},y:{ticks:{color:'#7d8590',stepSize:1},grid:{color:'#2a3441'}}}}
  });

  // 3. Buts par match — axe par jour
  destroyChart('buts');
  const sorted=[...matches].sort((a,b)=>a.date.localeCompare(b.date));
  // Construire la plage de dates complète (du premier au dernier match)
  const firstDate = new Date(sorted[0].date);
  const lastDate  = new Date(sorted[sorted.length-1].date);
  // Map date → buts pour lookup rapide (plusieurs matchs le même jour → on cumule)
  const butsParJour = {};
  const labelsParJour = {};
  sorted.forEach(m => {
    if (!butsParJour[m.date]) { butsParJour[m.date] = 0; labelsParJour[m.date] = []; }
    butsParJour[m.date] += m.score_dom + m.score_ext;
    labelsParJour[m.date].push(`${m.equipe_dom} vs ${m.equipe_ext}`);
  });
  // Générer tous les jours entre firstDate et lastDate
  const allDays = [], allButs = [], allTooltips = [];
  for (let d = new Date(firstDate); d <= lastDate; d.setDate(d.getDate()+1)) {
    const key = d.toISOString().slice(0,10);
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yy = String(d.getFullYear()).slice(2);
    allDays.push(`${dd}/${mm}/${yy}`);
    allButs.push(butsParJour[key] ?? null);
    allTooltips.push(labelsParJour[key] ? labelsParJour[key].join(', ') : null);
  }
  charts['buts']=new Chart(document.getElementById('chart-buts'),{
    type:'line',
    data:{
      labels: allDays,
      datasets:[{
        label:'Buts',
        data: allButs,
        borderColor:'#39d353',
        backgroundColor:'rgba(57,211,83,.1)',
        tension:.4, fill:true,
        pointBackgroundColor: allButs.map(v=>v!==null?'#39d353':'transparent'),
        pointRadius: allButs.map(v=>v!==null?5:0),
        spanGaps: false,
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            title: ctx => {
              const i = ctx[0].dataIndex;
              return allTooltips[i] ? `${allDays[i]} — ${allTooltips[i]}` : allDays[i];
            },
            label: ctx => ctx.raw !== null ? `${ctx.raw} but${ctx.raw>1?'s':''}` : ''
          }
        }
      },
      scales:{
        x:{
          ticks:{
            color:'#7d8590',
            maxRotation:45,
            autoSkip:true,
            maxTicksLimit:20,
            callback: function(val, i) {
              // N'affiche le label que si ce jour a un match
              return allButs[i] !== null ? allDays[i] : '';
            }
          },
          grid:{color:'#2a3441'}
        },
        y:{ticks:{color:'#7d8590',stepSize:1},grid:{color:'#2a3441'}}
      }
    }
  });

  // 4. Lieu
  destroyChart('lieu');
  const lc={};
  matches.forEach(m=>{lc[m.lieu]=(lc[m.lieu]||0)+1;});
  charts['lieu']=new Chart(document.getElementById('chart-lieu'),{
    type:'polarArea',
    data:{labels:Object.keys(lc),datasets:[{data:Object.values(lc),backgroundColor:['rgba(88,166,255,.7)','rgba(57,211,83,.7)','rgba(232,121,249,.7)','rgba(240,192,64,.7)'],borderWidth:0}]},
    options:{plugins:{legend:{labels:{color:'#7d8590'}}},scales:{r:{ticks:{color:'#7d8590',backdropColor:'transparent'},grid:{color:'#2a3441'}}}}
  });
}

// ══ TABS / HELPERS ══
function showTab(tab,e) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(e&&e.target) e.target.classList.add('active');
  if(tab==='tableau') renderTable();
  if(tab==='stats')   renderStats();
}

function updateHeaderStats() {
  document.getElementById('hs-total').textContent  = matches.length;
  document.getElementById('hs-buts').textContent   = matches.reduce((s,m)=>s+m.score_dom+m.score_ext,0);
  document.getElementById('hs-champs').textContent = new Set(matches.map(m=>m.champ)).size;
}

function showToast(msg, bg='#39d353') {
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  t.style.background=bg;
  if(bg!=='#39d353') t.style.color='#fff';
  document.body.appendChild(t);
  setTimeout(()=>{ t.classList.add('hide'); setTimeout(()=>t.remove(),300); },2400);
}

// ══ INIT ══
sb.auth.onAuthStateChange((_event, session) => {
  if (session?.user) {
    currentUser = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display  = 'block';
    document.getElementById('user-email-display').textContent = session.user.email || 'Connecté';
    document.getElementById('f-date').valueAsDate = new Date();
    loadMatches();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display  = 'none';
  }
});
</script>
